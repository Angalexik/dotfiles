<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <alias binding="strong">
        <family>serif</family>
        <prefer>
            <family>New York Small</family>
        </prefer>
    </alias>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>SF Pro Text</family>
        </prefer>
    </alias>
    <alias>
        <family>sans</family>
        <prefer>
            <family>SF Pro Text</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>monospace</family>
        <prefer>
            <family>Fira Code</family>
        </prefer>
    </alias>
    <alias>
        <family>SFMono</family>
        <prefer>
            <family>LigaturizedSFMono Nerd Font</family>
        </prefer>
    </alias>
    <alias>
        <family>cursive</family>
        <prefer>
            <family>flottflott</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Comic Sans MS</family>
        <prefer>
            <family>Comic Neue</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Impact</family>
        <prefer>
            <family>Anton</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>helvetica</family>
        <prefer>
            <family>Helvetica Neue LT Pro</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Trebuchet MS</family>
        <prefer>
            <family>FiraGO</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Fira Sans</family>
        <prefer>
            <family>FiraGO</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Helvetica Neue</family>
        <prefer>
            <family>Helvetica Neue LT Pro</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Linux Libertine</family>
        <prefer>
            <family>Linux Libertine O</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>times</family>
        <prefer>
            <family>Liberation Serif</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>courier</family>
        <prefer>
            <family>Courier Prime</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Courier New</family>
        <prefer>
            <family>Courier Prime</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>CourierNew</family>
        <prefer>
            <family>Courier Prime</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Menlo</family>
        <prefer>
            <family>Liga Meslo LG M DZ</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Meslo</family>
        <prefer>
            <family>Liga Meslo LG M DZ</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>SFMono-Regular</family>
        <prefer>
            <family>LigaturizedSFMono Nerd Font</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Segoe WPC</family>
        <prefer>
            <family>Helvetica</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>Segoe UI</family>
        <prefer>
            <family>SF Pro Text</family>
        </prefer>
    </alias>
    <selectfont>
        <rejectfont>
            <pattern>
                <patelt name="family">
                    <string>DejaVu Sans</string>
                </patelt>
            </pattern>
            <pattern>
                <patelt name="family">
                    <string>DejaVu Serif</string>
                </patelt>
            </pattern>
            <pattern>
                <patelt name="family">
                    <string>DejaVu Sans Mono</string>
                </patelt>
            </pattern>
        </rejectfont>
    </selectfont>
    <match target="font">
        <edit name="hinting" mode="assign">
            <bool>true</bool>
        </edit>
    </match>
    <match target="font">
        <edit name="hintstyle" mode="assign">
            <const>hintslight</const>
        </edit>
    </match>
    <dir>~/.fonts</dir>
    <match target="font">
        <edit name="rgba" mode="assign">
            <const>rgb</const>
        </edit>
    </match>
</fontconfig>
