<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <alias>
        <family>serif</family>
        <prefer><family>Josefin Slab</family></prefer>
    </alias>
    <alias>
        <family>sans-serif</family>
        <prefer><family>Montserrat</family></prefer>
    </alias>
    <alias>
        <family>sans</family>
        <prefer><family>Montserrat</family></prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer><family>JetBrains Mono</family></prefer>
    </alias>
    <selectfont>
    <rejectfont>
        <pattern>
            <patelt name="family">
                <string>DejaVu Sans</string>
            </patelt>
        </pattern>
        <pattern>
            <patelt name="family">
                <string>DejaVu Serif</string>
            </patelt>
        </pattern>
        <pattern>
            <patelt name="family">
                <string>DejaVu Sans Mono</string>
            </patelt>
        </pattern>
    </rejectfont>
</selectfont>

</fontconfig>
